version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: exam-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exam_db
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    ports: 
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
    environment:
      - DB_HOST = db
    command : npm run start:dev
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
    command: npm run dev -- --host

volumes:
  postgres_data:
